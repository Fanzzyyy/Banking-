<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | GlobalTrust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <!-- Admin Login -->
    <div id="adminLoginContainer" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-96">
            <div class="text-center mb-6">
                <i class="fas fa-shield-alt text-5xl text-blue-900"></i>
                <h2 class="text-2xl font-bold mt-2">Admin Portal</h2>
                <p class="text-gray-600 text-sm">GlobalTrust Bank</p>
            </div>
            <input type="email" id="adminEmail" placeholder="Admin Email" class="w-full p-2 border rounded mb-3">
            <input type="password" id="adminPassword" placeholder="Password" class="w-full p-2 border rounded mb-3">
            <button id="adminLoginBtn" class="w-full bg-blue-900 text-white py-2 rounded hover:bg-blue-800 transition">Login</button>
            <div id="adminError" class="text-red-500 text-sm mt-3 text-center"></div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="hidden">
        <nav class="bg-blue-900 text-white p-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-shield-alt text-2xl"></i>
                <span class="text-xl font-bold">Admin Dashboard</span>
            </div>
            <button id="adminLogout" class="bg-red-600 px-4 py-1 rounded hover:bg-red-700 transition">Logout</button>
        </nav>

        <div class="flex">
            <!-- Sidebar -->
            <div class="w-64 bg-white shadow min-h-screen p-4">
                <div class="space-y-2">
                    <button onclick="showSection('users')" class="w-full text-left p-3 hover:bg-gray-100 rounded transition flex items-center space-x-2">
                        <i class="fas fa-users"></i><span>Users & Accounts</span>
                    </button>
                    <button onclick="showSection('transactions')" class="w-full text-left p-3 hover:bg-gray-100 rounded transition flex items-center space-x-2">
                        <i class="fas fa-exchange-alt"></i><span>All Transactions</span>
                    </button>
                    <button onclick="showSection('limits')" class="w-full text-left p-3 hover:bg-gray-100 rounded transition flex items-center space-x-2">
                        <i class="fas fa-sliders-h"></i><span>Transfer Limits</span>
                    </button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="flex-1 p-6">
                <div id="loadingMessage" class="text-center py-8 hidden">
                    <i class="fas fa-spinner fa-spin text-2xl"></i> Loading...
                </div>
                
                <div id="usersSection">
                    <h2 class="text-2xl font-bold mb-4">Users and Accounts</h2>
                    <div id="usersList" class="space-y-4"></div>
                </div>
                
                <div id="transactionsSection" class="hidden">
                    <h2 class="text-2xl font-bold mb-4">All Transactions</h2>
                    <div class="overflow-x-auto bg-white rounded shadow">
                        <table class="w-full">
                            <thead class="bg-gray-800 text-white">
                                <tr><th class="p-3">Date</th><th>From Account</th><th>To Account</th><th>Amount</th><th>User ID</th></tr>
                            </thead>
                            <tbody id="allTransactionsTable"></tbody>
                        </table>
                    </div>
                </div>
                
                <div id="limitsSection" class="hidden">
                    <h2 class="text-2xl font-bold mb-4">Set Transfer Limits & Suspensions</h2>
                    <div id="accountsLimitsList" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // REPLACE WITH YOUR FIREBASE CONFIG (SAME AS index.html)
        const firebaseConfig = {
          apiKey: "AIzaSyCXZ-POCVStZ-c3WUE_XIYsXT0Du94c4Ks",
          authDomain: "globaltrustbank-4e211.firebaseapp.com",
          projectId: "globaltrustbank-4e211",
          storageBucket: "globaltrustbank-4e211.firebasestorage.app",
          messagingSenderId: "286854321",
          appId: "1:286854321:web:41cd00e3d6bcc4a92b2690",
          measurementId: "G-E6JGPTZK02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentAdmin = null;

        async function checkAdmin(uid) {
            try {
                const adminDoc = await getDoc(doc(db, "admins", uid));
                return adminDoc.exists();
            } catch (error) {
                console.error("Error checking admin:", error);
                return false;
            }
        }

        async function loadAllUsers() {
            try {
                const usersSnap = await getDocs(collection(db, "users"));
                const accountsSnap = await getDocs(collection(db, "accounts"));
                
                const accountsByUser = {};
                accountsSnap.forEach(doc => {
                    const data = doc.data();
                    if (!accountsByUser[data.userId]) accountsByUser[data.userId] = [];
                    accountsByUser[data.userId].push({ id: doc.id, ...data });
                });
                
                const container = document.getElementById('usersList');
                container.innerHTML = "";
                
                if (usersSnap.empty) {
                    container.innerHTML = '<div class="bg-white p-4 rounded shadow text-center text-gray-500">No users found</div>';
                    return;
                }
                
                for (const userDoc of usersSnap.docs) {
                    const user = userDoc.data();
                    const accounts = accountsByUser[userDoc.id] || [];
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded shadow";
                    div.innerHTML = `
                        <div class="font-bold text-lg">${user.name || 'No name'}</div>
                        <div class="text-gray-600 text-sm mb-2">${user.email}</div>
                        <div class="text-sm">User ID: ${userDoc.id.slice(0, 12)}...</div>
                    `;
                    accounts.forEach(acc => {
                        const suspended = acc.suspendedUntil ? new Date(acc.suspendedUntil.toDate()).toLocaleDateString() : 'No';
                        div.innerHTML += `
                            <div class="ml-4 mt-2 p-2 bg-gray-50 rounded text-sm border-l-4 border-blue-500">
                                <strong>${acc.type.toUpperCase()}</strong> - #${acc.accountNumber}<br>
                                Balance: $${acc.balance.toFixed(2)} | Daily Limit: $${acc.dailyLimit || 5000}<br>
                                Suspended: ${suspended}
                            </div>
                        `;
                    });
                    container.appendChild(div);
                }
            } catch (error) {
                console.error("Error loading users:", error);
                document.getElementById('usersList').innerHTML = `<div class="bg-red-100 p-4 rounded text-red-700">Error loading users: ${error.message}</div>`;
            }
        }

        async function loadAllTransactions() {
            try {
                const txnSnap = await getDocs(query(collection(db, "transactions"), orderBy("date", "desc")));
                const tbody = document.getElementById('allTransactionsTable');
                tbody.innerHTML = "";
                
                if (txnSnap.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-gray-500">No transactions found</td></tr>';
                    return;
                }
                
                txnSnap.forEach(doc => {
                    const t = doc.data();
                    const date = t.date.toDate ? t.date.toDate() : new Date(t.date);
                    const row = `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3">${date.toLocaleString()}</td>
                            <td class="p-3 text-sm">${t.fromAccountId?.slice(0, 8) || 'N/A'}...</td>
                            <td class="p-3 text-sm">${t.toAccountId?.slice(0, 8) || 'N/A'}...</td>
                            <td class="p-3 font-bold text-green-600">$${t.amount?.toFixed(2) || '0'}</td>
                            <td class="p-3 text-xs">${t.userId?.slice(0, 8) || 'N/A'}...</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error loading transactions:", error);
                document.getElementById('allTransactionsTable').innerHTML = `<tr><td colspan="5" class="text-center p-4 text-red-700">Error: ${error.message}</td></tr>`;
            }
        }

        async function loadAccountsForLimits() {
            try {
                const accountsSnap = await getDocs(collection(db, "accounts"));
                const container = document.getElementById('accountsLimitsList');
                container.innerHTML = "";
                
                if (accountsSnap.empty) {
                    container.innerHTML = '<div class="bg-white p-4 rounded shadow text-center text-gray-500">No accounts found</div>';
                    return;
                }
                
                for (const accDoc of accountsSnap.docs) {
                    const acc = accDoc.data();
                    try {
                        const userSnap = await getDoc(doc(db, "users", acc.userId));
                        const userName = userSnap.exists() ? userSnap.data().name : "Unknown User";
                        const suspendedUntil = acc.suspendedUntil && acc.suspendedUntil.toDate ? 
                            acc.suspendedUntil.toDate().toISOString().split('T')[0] : "";
                        
                        const div = document.createElement('div');
                        div.className = "bg-white p-4 rounded shadow";
                        div.innerHTML = `
                            <div class="font-bold">${userName}</div>
                            <div class="text-sm text-gray-600 mb-2">${acc.type} Account - #${acc.accountNumber}</div>
                            <div class="grid md:grid-cols-2 gap-3 mt-2">
                                <div>
                                    <label class="block text-sm font-semibold">Daily Limit ($)</label>
                                    <input type="number" id="limit_${accDoc.id}" value="${acc.dailyLimit || 5000}" class="border rounded p-2 w-full">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold">Suspend Until (date)</label>
                                    <input type="date" id="suspend_${accDoc.id}" value="${suspendedUntil}" class="border rounded p-2 w-full">
                                </div>
                            </div>
                            <button onclick="window.updateAccount('${accDoc.id}')" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                                Save Changes
                            </button>
                        `;
                        container.appendChild(div);
                    } catch (err) {
                        console.error("Error loading user for account:", err);
                    }
                }
                
                // Make update function global
                window.updateAccount = async (accountId) => {
                    try {
                        const newLimit = parseFloat(document.getElementById(`limit_${accountId}`).value);
                        const suspendDate = document.getElementById(`suspend_${accountId}`).value;
                        const updates = { dailyLimit: newLimit };
                        if (suspendDate) updates.suspendedUntil = new Date(suspendDate);
                        else updates.suspendedUntil = null;
                        
                        await updateDoc(doc(db, "accounts", accountId), updates);
                        alert("Account updated successfully!");
                        await loadAccountsForLimits();
                    } catch (error) {
                        console.error("Error updating account:", error);
                        alert("Error updating account: " + error.message);
                    }
                };
            } catch (error) {
                console.error("Error loading accounts for limits:", error);
                document.getElementById('accountsLimitsList').innerHTML = `<div class="bg-red-100 p-4 rounded text-red-700">Error: ${error.message}</div>`;
            }
        }

        function showLoading(show) {
            const loader = document.getElementById('loadingMessage');
            if (loader) {
                if (show) loader.classList.remove('hidden');
                else loader.classList.add('hidden');
            }
        }

        async function showSection(section) {
            document.getElementById('usersSection').classList.add('hidden');
            document.getElementById('transactionsSection').classList.add('hidden');
            document.getElementById('limitsSection').classList.add('hidden');
            
            showLoading(true);
            
            try {
                if (section === 'users') {
                    document.getElementById('usersSection').classList.remove('hidden');
                    await loadAllUsers();
                }
                if (section === 'transactions') {
                    document.getElementById('transactionsSection').classList.remove('hidden');
                    await loadAllTransactions();
                }
                if (section === 'limits') {
                    document.getElementById('limitsSection').classList.remove('hidden');
                    await loadAccountsForLimits();
                }
            } catch (error) {
                console.error("Error showing section:", error);
            } finally {
                showLoading(false);
            }
        }

        // Admin login
        document.getElementById('adminLoginBtn').onclick = async () => {
            const email = document.getElementById('adminEmail').value;
            const pwd = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('adminError');
            
            if (!email || !pwd) {
                errorDiv.innerText = "Please enter email and password";
                return;
            }
            
            errorDiv.innerText = "Logging in...";
            
            try {
                const cred = await signInWithEmailAndPassword(auth, email, pwd);
                const isAdmin = await checkAdmin(cred.user.uid);
                
                if (!isAdmin) {
                    await signOut(auth);
                    throw new Error("Not authorized as admin");
                }
                
                currentAdmin = cred.user;
                document.getElementById('adminLoginContainer').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                errorDiv.innerText = "";
                
                // Load initial data
                await showSection('users');
                
            } catch (e) {
                console.error("Admin login error:", e);
                let errorMsg = e.message;
                if (e.code === 'auth/user-not-found') errorMsg = "Admin account not found";
                if (e.code === 'auth/wrong-password') errorMsg = "Incorrect password";
                errorDiv.innerText = errorMsg;
            }
        };
        
        document.getElementById('adminLogout').onclick = async () => {
            try {
                await signOut(auth);
            } catch (e) {
                console.error("Logout error:", e);
            }
        };
        
        onAuthStateChanged(auth, (user) => {
            if (!user && currentAdmin) {
                // Admin logged out
                document.getElementById('adminLoginContainer').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
                currentAdmin = null;
                document.getElementById('adminEmail').value = '';
                document.getElementById('adminPassword').value = '';
            }
        });
        
        window.showSection = showSection;
        console.log("Admin panel initialized");
    </script>
</body>
</html>
